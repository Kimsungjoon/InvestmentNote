name: 포트폴리오 자동 업데이트

on:
  schedule:
    # 미국 동부 장 마감(오후 4시) 기준
    # EDT (3월~11월): 20:00 UTC = 익일 05:00 KST
    # EST (11월~3월): 21:00 UTC = 익일 06:00 KST
    # 두 시즌 모두 커버하도록 21:05 UTC에 실행
    - cron: '5 21 * * 1-5'

  # 수동 실행 버튼 활성화 (GitHub Actions 탭에서 직접 실행 가능)
  workflow_dispatch:

# 레포 쓰기 권한 부여 (파일 커밋 & 푸시에 필요)
permissions:
  contents: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 포트폴리오 스크립트 실행
        run: python portfolio.py

      - name: 결과 파일 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 매매노트/ portfolio_history.json
          git diff --staged --quiet || git commit -m "📊 포트폴리오 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
