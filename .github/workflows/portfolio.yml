name: 포트폴리오 자동 업데이트

on:
  schedule:
    # 장중 손절/목표가 점검 — 30분마다 (미국 정규장 커버)
    # EDT: 14:30~20:00 UTC / EST: 15:30~21:00 UTC → 14~20시 대역으로 양쪽 커버
    - cron: '*/30 14-20 * * 1-5'
    # 장 마감 일일 리포트
    # EDT 20:00 / EST 21:00 UTC 마감 → 21:05 UTC
    - cron: '5 21 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: daily
        type: choice
        options:
          - daily
          - alerts
          - test

permissions:
  contents: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 모드 결정 후 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -e
          MODE="${INPUT_MODE:-}"
          if [ -z "$MODE" ]; then
            # schedule: 21시 UTC → 일일 리포트, 그 외 → 알림 전용
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "21" ]; then
              MODE=daily
            else
              MODE=alerts
            fi
          fi
          echo "실행 모드: $MODE (UTC $(date -u +%H:%M))"
          if [ "$MODE" = "test" ]; then
            python portfolio.py --test-notify
          elif [ "$MODE" = "alerts" ]; then
            python portfolio.py --alerts-only
          else
            python portfolio.py
          fi

      - name: 결과 파일 커밋 & 푸시
        if: ${{ github.event.inputs.mode != 'test' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_history.json
          git diff --staged --quiet || git commit -m "📊 portfolio_history 자동 갱신 $(date +'%Y-%m-%d')"
          git push
