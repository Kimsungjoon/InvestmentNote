name: 포트폴리오 자동 업데이트

on:
  schedule:
    # 장중 손절/목표가 점검 (미국 정규장 + 개장 전후 여유)
    # EDT: 13:30~20:00 UTC / 지연 대비 13~21시 매시·30분
    - cron: '0,30 13-21 * * 1-5'
    # 장 마감 일일 리포트 (21:05 UTC) — 모드 판별은 아래 스크립트
    - cron: '5 21 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: daily
        type: choice
        options:
          - daily
          - alerts
          - test
          - test-stop

permissions:
  contents: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 모드 결정 후 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -e
          MODE="${INPUT_MODE:-}"
          if [ -z "$MODE" ]; then
            # schedule: 21:00~21:59 UTC만 일일 리포트 (지연 실행 포함)
            # 그 외 시각은 알림 전용. GitHub cron은 수분~1시간 지연될 수 있음.
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [ "$HOUR" = "21" ]; then
              MODE=daily
            else
              MODE=alerts
            fi
            echo "schedule 시각 UTC ${HOUR}:${MIN}"
          fi
          echo "실행 모드: $MODE (UTC $(date -u +%H:%M))"
          if [ "$MODE" = "test-stop" ]; then
            python portfolio.py --test-stop HWM
          elif [ "$MODE" = "test" ]; then
            python portfolio.py --test-notify
          elif [ "$MODE" = "alerts" ]; then
            python portfolio.py --alerts-only
          else
            python portfolio.py
          fi

      - name: 결과 파일 커밋 & 푸시
        if: ${{ github.event.inputs.mode != 'test' && github.event.inputs.mode != 'test-stop' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_history.json
          git diff --staged --quiet || git commit -m "📊 portfolio_history 자동 갱신 $(date +'%Y-%m-%d')"
          git push
